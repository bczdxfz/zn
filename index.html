<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>一周年专属寻访</title>
    <style>
        /* --- 全局基础设置 --- */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            font-family: "SimHei", "Microsoft YaHei", sans-serif;
            overflow: hidden; /* 确保body不会滚动，防止粒子被卷走 */
            color: #fff;
            user-select: none;
        }

        /* --- 页面通用容器 --- */
        .page {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none; /* 默认隐藏 */
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s ease;
            /* 确保页面内容不会遮挡全屏特效 */
            z-index: 10;
        }

        .active {
            display: flex; /* 激活时显示 */
        }

        /* ================= 第一页：祝福页样式 ================= */
        #blessing-page {
            background: linear-gradient(135deg, #1a1a2e, #162447);
            text-align: center;
            z-index: 20;
        }

        h1 {
            font-size: 48px;
            letter-spacing: 5px;
            margin-bottom: 40px;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }

        /* 发光的菱形图标（已缩小） */
        .diamond-icon {
            width: 45px; /* 从60px缩小到45px */
            height: 45px;
            background-color: #0098DC; /* 方舟蓝 */
            transform: rotate(45deg);
            margin: 0 auto 20px auto;
            box-shadow: 0 0 15px #0098DC;
            animation: breathe 2s infinite ease-in-out;
            cursor: pointer;
            position: relative;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .diamond-text {
            /* 修正：精确居中 */
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-45deg);
            font-size: 11px; /* 字体略小以适应 */
            white-space: nowrap;
            font-weight: bold;
            color: white;
            pointer-events: none; /* 确保点击穿透到菱形 */
        }

        @keyframes breathe {
            0%, 100% { box-shadow: 0 0 10px #0098DC; opacity: 0.8; }
            50% { box-shadow: 0 0 25px #0098DC, 0 0 5px white; opacity: 1; }
        }

        /* 弹窗样式 */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .modal-box {
            background: #222;
            padding: 30px 50px;
            border: 1px solid #0098DC;
            text-align: center;
            border-radius: 4px;
            box-shadow: 0 0 30px rgba(0, 152, 220, 0.3);
            animation: popIn 0.3s ease-out;
        }

        @keyframes popIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        /* ================= 第二页：寻访页样式 ================= */
        #gacha-page {
            /* 背景图：这里使用了占位符，你可以替换成山山兔剪影的真实链接 */
            background-image: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.8)), url('https://raw.githubusercontent.com/bczdxfz/zn/refs/heads/main/xf.jpg');
            background-size: cover;
            background-position: center;
            justify-content: flex-start; /* 内容靠上对齐 */
            overflow: hidden; /* 确保canvas不会溢出 */
            z-index: 30;
        }

        /* 烟花特效画布样式 */
        .firework-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* 让画布不阻挡下方的点击事件 */
            z-index: 1; /* 低于标题和按钮，高于背景 */
        }

        .gacha-title-container {
            position: relative;
            margin-top: 15vh; /* 与之前保持一致 */
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 3; /* 确保标题容器在烟花之上 */
        }

        /* 新增的大号发光菱形背景 */
        .large-glowing-diamond {
            width: 200px; /* 大于文字宽度 */
            height: 200px; /* 大于文字高度 */
            border: 3px solid rgba(255, 255, 255, 0.6); /* 半透明白色边框 */
            transform: rotate(45deg);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.6), 0 0 40px rgba(255, 255, 255, 0.3);
            animation: diamondGlowLarge 2s infinite alternate; /* 呼吸灯效果 */
            z-index: 2; /* 低于文字 */
            position: absolute; /* 绝对定位作为背景 */
            top: 50%;
            left: 45%;
            transform: translate(-50%, -50%) rotate(45deg); /* 居中并对齐 */
        }

        .gacha-title {
            font-size: 64px;
            font-weight: 900;
            writing-mode: vertical-rl; /* 竖排文字 */
            letter-spacing: 15px;
            text-shadow: 0 0 15px rgba(255,255,255,0.6);
            border-right: 3px solid white;
            padding-right: 15px;
            height: 400px; /* 增加高度以便视觉居中 */
            display: flex;
            align-items: center;
            z-index: 3; /* 确保标题在大菱形之上 */
        }

        .gacha-subtitle {
            margin-top: 20px; /* 在标题下方，与按钮保持距离 */
            font-size: 18px;
            color: #aaa;
            letter-spacing: 3px;
            opacity: 0.8;
            z-index: 3; /* 确保副标题在大菱形之上 */
            text-align: center; /* 确保独占一行并居中 */
        }

        /* 按钮容器（右下角，已上移） */
        .gacha-controls {
            position: absolute;
            bottom: 80px; /* 从50px上移到80px */
            right: 60px;  /* 从50px右移到60px */
            display: flex;
            gap: 25px; /* 按钮间距 */
            align-items: flex-end;
            z-index: 3; /* 确保按钮在烟花之上 */
        }

        .gacha-btn {
            width: 160px;
            height: 55px;
            border: none;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            color: white;
            /* 明日方舟风格切角按钮 */
            clip-path: polygon(15% 0, 100% 0, 100% 70%, 85% 100%, 0 100%, 0 30%);
            transition: 0.2s;
            position: relative;
            overflow: hidden;
        }

        /* 寻访一次（蓝色，在左侧） */
        .btn-once {
            background: #0098DC;
            z-index: 2;
        }

        .btn-once:hover {
            background: #00b0ff;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 152, 220, 0.4);
        }

        /* 寻访十次（灰色，在右侧，不可点） */
        .btn-ten {
            background: #333;
            color: #666;
            cursor: not-allowed;
            border: 1px solid #444;
        }

        /* ================= 第三页：寻访结果页（HR包） ================= */
        #result-page {
            /* 移除背景色，只依赖图片 */
            /* background-color: rgba(17, 17, 17, 0.9); */
            /* 这里填入你提供的HR包图片链接 */
            background-image: url("https://raw.githubusercontent.com/bczdxfz/zn/refs/heads/main/bj.jpg");
            background-size: cover;
            background-position: center;
            justify-content: center;
            align-items: center;
            /* 添加淡入动画 */
            animation: fadeInBackground 8s ease-out forwards;
            opacity: 0; /* 初始透明 */
            z-index: 40; /* 确保在大部分页面之上 */
            /* 关键：确保自身不形成裁剪边界 */
            overflow: visible;
        }

        @keyframes fadeInBackground {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* 灰尘特效容器 - 直接放在 body 下，层级最高 */
        #dust-container-global {
            position: fixed; /* 使用 fixed 确保始终覆盖在视口最上方 */
            top: 0;
            left: 0;
            width: 100vw; /* 使用视口单位 */
            height: 100vh;
            pointer-events: none; /* 允许点击穿透 */
            z-index: 9999; /* 设定一个极高的 z-index */
            /* 关键：确保容器本身不裁剪内容 */
            overflow: visible;
            /* 初始隐藏，仅在需要时显示 */
            display: none;
        }

        .dust-particle {
            position: absolute;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            pointer-events: none;
            /* 关键：直接应用动画 */
            animation: floatUp linear infinite;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% { /* 在上升初期快速显化 */
                opacity: 0.8;
            }
            90% { /* 在结束前缓慢开始淡化 */
                 opacity: 0.6;
            }
            100% {
                /* 关键：改为移动到屏幕外，而不是仅仅变透明 */
                transform: translateY(-150vh) rotate(360deg); /* 移动到屏幕上方1.5倍高度之外 */
                opacity: 0; /* 最终透明，但主要是因为它已经移出了屏幕 */
            }
        }

    </style>
</head>
<body>

    <!-- ================= 第一页：祝福页 ================= -->
    <div id="blessing-page" class="page active">
        <h1>一周年快乐!</h1>
        
        <!-- 缩小的菱形图标，文字在内部，已居中 -->
        <div class="diamond-icon" id="receive-btn">
            <div class="diamond-text">收下祝福</div>
        </div>
    </div>

    <!-- 弹窗：领取提示 -->
    <div id="receive-modal" class="modal">
        <div class="modal-box">
            <h3>已领取一个寻访礼物卡</h3>
            <p style="color:#888; font-size:14px; margin-top:15px;">点击屏幕继续</p>
        </div>
    </div>

    <!-- ================= 第二页：寻访页 ================= -->
    <div id="gacha-page" class="page">
        <!-- 烟花特效画布 -->
        <canvas id="firework-canvas" class="firework-canvas"></canvas>
        
        <div class="gacha-title-container">
            <div class="large-glowing-diamond"></div> <!-- 大菱形背景 -->
            <div class="gacha-title">·恰逢其时</div>
            <div class="gacha-subtitle">限定寻访开启</div>
        </div>

        <!-- 按钮组：位置互换（一次在左，十次在右），并整体上移 -->
        <div class="gacha-controls">
            <button class="gacha-btn btn-once" id="gacha-once-btn">寻访一次</button>
            <button class="gacha-btn btn-ten">寻访十次</button>
        </div>
    </div>

    <!-- ================= 第三页：寻访结果（HR包背景） ================= -->
    <div id="result-page" class="page">
        <!-- 已删除 "等待结果..." 文字 -->
    </div>

    <!-- ================= 全局灰尘特效容器 (直接在 body 下) ================= -->
    <div id="dust-container-global"></div>

    <script>
        // --- 获取元素 ---
        const blessingPage = document.getElementById('blessing-page');
        const gachaPage = document.getElementById('gacha-page');
        const resultPage = document.getElementById('result-page');
        
        const receiveBtn = document.getElementById('receive-btn');
        const receiveModal = document.getElementById('receive-modal');
        
        const gachaOnceBtn = document.getElementById('gacha-once-btn');
        const dustContainerGlobal = document.getElementById('dust-container-global');

        // --- 烟花相关变量 ---
        const canvas = document.getElementById('firework-canvas');
        const ctx = canvas.getContext('2d');
        let fireworks = [];
        let animationId;

        // --- 重置画布尺寸 ---
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas(); // 初始化

        // --- 烟花粒子类 ---
        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.radius = Math.random() * 1.5 + 0.5;
                this.velocity = {
                    x: (Math.random() - 0.5) * 5,
                    y: (Math.random() - 0.5) * 5
                };
                this.alpha = 1;
                this.gravity = 0.01; // 很小的重力，模拟悬浮感
                this.decay = Math.random() * 0.1 + 0.015; // 衰减速度
            }

            update() {
                this.velocity.y += this.gravity;
                this.x += this.velocity.x;
                this.y += this.velocity.y;
                this.alpha -= this.decay;

                // 返回 true 表示粒子仍然存活，false 表示已经消失
                return this.alpha > 0;
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
                ctx.restore();
            }
        }

        // --- 创建单次爆炸效果 ---
        function createExplosion(x, y) {
            const particleCount = 20; // 每次爆炸的粒子数
            const colors = ['#FFD700', '#FFFFFF', '#FFA500']; // 金、白、橙色

            for (let i = 0; i < particleCount; i++) {
                const color = colors[Math.floor(Math.random() * colors.length)];
                fireworks.push(new Particle(x, y, color));
            }
        }

        // --- 动画循环 ---
        function animateFireworks() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 使用 filter 方法更新并保留仍然存活的粒子
            fireworks = fireworks.filter(particle => {
                const isAlive = particle.update();
                if (isAlive) {
                    particle.draw();
                }
                return isAlive;
            });

            animationId = requestAnimationFrame(animateFireworks);
        }

        // --- 启动/停止烟花动画 ---
        function startFireworks() {
            // 如果已经在运行，则先清除
            if (animationId) {
                cancelAnimationFrame(animationId);
            }
            fireworks = []; // 清空现有粒子
            animateFireworks(); // 开始新动画

            // 定期间隔在随机位置创建爆炸
            const interval = setInterval(() => {
                if (!gachaPage.classList.contains('active')) {
                    clearInterval(interval); // 如果页面不再激活，则停止创建新粒子
                    return;
                }
                const x = Math.random() * canvas.width;
                const y = Math.random() * canvas.height * 0.6; // 主要集中在上方区域
                createExplosion(x, y);
            }, 200); // 每200毫秒产生一次小爆炸
        }

        function stopFireworks() {
            if (animationId) {
                cancelAnimationFrame(animationId);
                animationId = null;
            }
            fireworks = []; // 清空粒子数组
            ctx.clearRect(0, 0, canvas.width, canvas.height); // 清空画布
        }


        // --- 逻辑 1：第一页 -> 弹窗 -> 第二页 ---
        receiveBtn.addEventListener('click', () => {
            receiveModal.style.display = 'flex';
        });

        receiveModal.addEventListener('click', () => {
            receiveModal.style.display = 'none';
            blessingPage.classList.remove('active');
            // 稍微延迟一点再显示第二页，增加切换感
            setTimeout(() => {
                gachaPage.classList.add('active');
                startFireworks(); // 切换到寻访页时启动烟花
            }, 200);
        });

        // --- 逻辑 2：第二页 -> 第三页 (寻访) ---
        gachaOnceBtn.addEventListener('click', () => {
            gachaPage.classList.remove('active');
            stopFireworks(); // 离开寻访页时停止烟花
            
            // 显示结果页
            resultPage.classList.add('active'); 

            // 关键：在 next tick (下一帧) 之后再创建灰尘，确保页面状态完全更新
            setTimeout(() => {
                createDustEffectGlobal();
            }, 0);

            // 4. (可选) 模拟加载后跳转或重置
            // setTimeout(() => { alert("获得奖励！"); location.reload(); }, 3000);
        });

        // --- 全局灰尘特效生成函数 ---
        function createDustEffectGlobal() {
            console.log("Creating dust effect..."); // 添加日志用于调试
            // 清空旧的粒子（防止重复点击叠加）
            dustContainerGlobal.innerHTML = '';
            // 显示容器
            dustContainerGlobal.style.display = 'block';

            const particleCount = 60; // 粒子数量

            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.classList.add('dust-particle');

                // 随机大小 (2px - 6px)
                const size = Math.random() * 4 + 2;
                particle.style.width = `${size}px`;
                particle.style.height = `${size}px`;

                // 随机起始位置 (底部)
                particle.style.left = `${Math.random() * 100}%`;
                particle.style.top = `100%`;

                // 随机动画时长 (5s - 10s)
                const duration = Math.random() * 5 + 5;
                particle.style.animationDuration = `${duration}s`;

                // 随机延迟开始 (0s - 2s)
                const delay = Math.random() * 2;
                particle.style.animationDelay = `${delay}s`;

                // 随机颜色
                const colors = ['#FFF', '#CCC', '#AAA'];
                particle.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];

                dustContainerGlobal.appendChild(particle);
            }
            
            console.log(`Added ${particleCount} dust particles.`); // 添加日志用于调试
        }

    </script>
</body>
</html>
